name: PR

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  preflight:
    name: Workflow preflight
    permissions:
      contents: read
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-solution-preflight.yml@main
    with:
      runs-on: 'ubuntu-latest'
      project-path: './HoneyDrunk.Memory.slnx'
      missing-message: 'No ./HoneyDrunk.Memory.slnx found yet; skipping .NET PR validation until the repo scaffold lands.'

  pr-core:
    name: PR Core
    needs: preflight
    if: needs.preflight.outputs['project-exists'] == 'true'
    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write
      security-events: write
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/pr-core.yml@main
    with:
      dotnet-version: '10.0.x'
      configuration: 'Release'
      runs-on: 'ubuntu-latest'
      working-directory: '.'
      project-path: './HoneyDrunk.Memory.slnx'
      enable-secret-scan: true
      enable-accessibility-check: false
      post-pr-summary: true
      actions-ref: 'main'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
